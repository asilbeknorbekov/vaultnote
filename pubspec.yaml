name: vaultnote
description: "Your AI Second Brain."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: any
  hooks_riverpod: any

  # Routing
  go_router: any

  # UI & Design System
  google_fonts: any
  cupertino_icons: any
  cached_network_image: any
  shimmer: any
  flutter_animate: any

  # Dependency Injection
  get_it: any
  injectable: any

  # Database & Storage
  drift: any
  sqlite3_flutter_libs: any
  path_provider: any
  path: any
  shared_preferences: any
  flutter_secure_storage: any
  encrypt: any

  # Security & Auth
  local_auth: any

  # Background tasks
  workmanager: any

  # Error reporting
  sentry_flutter: any

  # Utilities
  freezed_annotation: any
  json_annotation: any
  uuid: any
  intl: any
  permission_handler: any
  equatable: any

  # Document / Audio handling
  file_picker: any
  record: any
  audioplayers: any
  image_picker: any
  flutter_markdown: any
  share_plus: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  build_runner: any
  freezed: any
  json_serializable: any
  drift_dev: any
  injectable_generator: any
  mocktail: any

flutter:
  uses-material-design: true
